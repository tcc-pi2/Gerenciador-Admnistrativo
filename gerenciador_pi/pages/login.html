<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="login.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Container principal (centraliza tudo na tela) -->
    <div class="container">

        <!-- Card de login -->
        <div class="card">

            <!-- Título -->
            <div class="header">
                <h1>Acesso ao Painel</h1>
                <p>Gestão administrativa</p>
            </div>

            <!-- Formulário -->
            <div class="form">

                <!-- Campo de email -->
                <div class="input-group">
                    <label>E-mail corporativo</label>
                    <input type="email" id="email" placeholder="nome@marca.com">
                </div>

                <!-- Campo de senha -->
                <div class="input-group">
                    <div class="label-row">
                        <label>Senha</label>
                        <span class="forgot">Esqueceu a senha?</span>
                    </div>
                    <input type="password" id="senha" placeholder="••••••••">
                </div>

                <!-- Botão -->
                <button id = "entrar" class="btn">Entrar</button>

            </div>

            <!-- Rodapé -->
            <div class="footer">
                <p>Problemas com acesso? <span>Contate o suporte</span></p>
            </div>

        </div>
    </div>

</body>
</html>
