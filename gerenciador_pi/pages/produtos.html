    function getStockClass(stock) {
      if (stock > 10) return "stock-green";
      if (stock > 5) return "stock-orange";
      return "stock-red";
    }

    function renderTable() {
      const tbody = document.querySelector("#productTable tbody");
      tbody.innerHTML = "";

      products.forEach(product => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td><img src="${product.img}" alt="${product.name}" class="product-img"></td>
          <td><strong>${product.name}</strong></td>
          <td>
            <div class="size-tags">
              ${product.sizes.map(size => `<span class="size-tag">${size}</span>`).join('')}
            </div>
          </td>
          <td>
            <span class="stock ${getStockClass(product.stock)}">${product.stock} un.</span>
          </td>
          <td class="price">R$ ${product.price}</td>
          <td class="actions">
            <button class="btn-action" title="Editar"><i class="fas fa-edit"></i></button>
            <button class="btn-action" title="Excluir"><i class="fas fa-trash"></i></button>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    function novoProduto() {
      alert("Funcionalidade de Novo Produto em desenvolvimento! ✨");
    }

    function sair() {
      if (confirm("Deseja realmente sair do sistema?")) {
        alert("Saindo do sistema...");
        // Aqui você pode redirecionar ou fazer logout
      }
    }

    // Inicialização
    window.onload = () => {
      renderTable();
    };
  </script>
