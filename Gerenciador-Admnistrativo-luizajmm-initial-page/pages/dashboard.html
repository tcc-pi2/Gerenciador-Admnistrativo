<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style_dashboard.css">
</head>
<body>
    <div class="container_dashboard">

        <aside class="sidebar">
            <div class="header_dashboard">
                <img src="/Gerenciador-Admnistrativo-luizajmm-initial-page/image/foto_admin.png" alt="Foto Admin">
                <h1>Olá, Admin</h1>
                <p>Administrador</p>
            </div>

            <nav class="dashboard">
                <div class="item">
                    <img src="/Gerenciador-Admnistrativo-luizajmm-initial-page/image/logo_dashboard.png" alt="logo_dashboard">
                    <h2>Dashboard</h2>
                    <a href=""></a>
                </div>
                <div class="item">
                    <img src="/Gerenciador-Admnistrativo-luizajmm-initial-page/image/logo_produtos.png" alt="Logo_produtos">
                    <h2>Produtos</h2>
                    <a href=""></a>
                </div>
                <div class="item">
                    <img src="/Gerenciador-Admnistrativo-luizajmm-initial-page/image/logo_categorias.png" alt="logo_categoria">
                    <h2>Categorias</h2>
                    <a href=""></a>
                </div>
                <div class="item">
                    <img src="/Gerenciador-Admnistrativo-luizajmm-initial-page/image/logo.admin.png" alt="logo_admin">
                    <h2>Administradores</h2>
                    <a href=""></a>
                </div>
            </nav>
        </aside>

        <main class="main_dashboard">
            <h1 class="titulo">Dashboard</h1>
            <p class="subtitulo">Visão geral executiva</p>

            <div class="cards_dashboard">
                <div class="card">
                    <h2>Produtos</h2>
                    <h1>124</h1>
                    <p>ITENS <br> CADASTRADOS</p>
                </div>

                <div class="card">
                    <h2>Categorias</h2>
                    <h1>12</h1>
                    <p>COLEÇÕES <br> ATIVAS</p>
                </div>

                <div class="card">
                    <h2>Admin</h2>
                    <h1>5</h1>
                    <p>ACESSO TOTAL</p>
                </div>
            </div>
        </main>

    </div>
</body>
</html>
